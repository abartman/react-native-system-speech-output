// 3SenseApp/packages/system-speech-output/android/build.gradle
apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

static def safeExtGet(rootProject, prop, fallback) {
  return rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace "ai.threesense.systemspeechoutput"
  compileSdkVersion safeExtGet(rootProject, "compileSdkVersion", 36)

  defaultConfig {
    minSdkVersion safeExtGet(rootProject, "minSdkVersion", 26)
    targetSdkVersion safeExtGet(rootProject, "targetSdkVersion", 36)
    consumerProguardFiles "consumer-rules.pro"
  }

  sourceSets {
    main.java.srcDirs += ["src/main/java"]
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"
}
